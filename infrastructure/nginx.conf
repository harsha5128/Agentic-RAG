server {
    listen 80;
    server_name _;

    # Document Ingestion
    location /ingest/ {
        proxy_pass http://document-ingestion:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Embedding Service
    location /embed/ {
        proxy_pass http://embedding-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Retrieval Service
    location /retrieve/ {
        proxy_pass http://retrieval-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Agent Orchestration
    location /orchestrate/ {
        proxy_pass http://agent-orchestration:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Query Processing
    location /query/ {
        proxy_pass http://query-processing:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Evaluation Service
    location /evaluate/ {
        proxy_pass http://evaluation-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
